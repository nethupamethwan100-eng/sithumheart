<!DOCTYPE html>
<html>
<head>
    <title>Particle Heart</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heart"></canvas>

    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 600;

        function getHeartPoint(t) {
            return {
                x: 160 * Math.pow(Math.sin(t), 3),
                y: - (130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t))
            };
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                t: Math.random() * Math.PI * 2,
                speed: 0.01 + Math.random() * 0.02,
                size: Math.random() * 2 + 1,
                color: `hsl(${Math.random() * 360}, 70%, 80%)`
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // Creates the "trail" effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.t += p.speed;
                const pos = getHeartPoint(p.t);
                
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(pos.x + canvas.width / 2, pos.y + canvas.height / 2, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
  </html>
