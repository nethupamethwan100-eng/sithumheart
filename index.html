<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I will always choose you</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; }

    /* animated film grain */
    body::after {
      content:'';
      position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px 180px;
      opacity:0.032;
      pointer-events:none;
      z-index:100;
      animation:grain 0.35s steps(1) infinite;
    }
    @keyframes grain {
      0%  {background-position:0 0}
      25% {background-position:-60px 40px}
      50% {background-position:40px -30px}
      75% {background-position:-30px -50px}
    }

    canvas { position:fixed; top:0; left:0; width:100%; height:100%; }

    /* vignette */
    #vig {
      position:fixed; inset:0; pointer-events:none; z-index:10;
      background:radial-gradient(ellipse at center,
        transparent 38%,
        rgba(0,0,0,0.5) 70%,
        rgba(0,0,0,0.93) 100%
      );
    }

    /* text */
    #tw {
      position:fixed;
      bottom:16%;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
      pointer-events:none;
      z-index:20;
      opacity:0;
      transition:opacity 2s ease;
    }
    #tw.show { opacity:1; }

    #tm {
      font-family:'Cormorant Garamond', serif;
      font-style:italic;
      font-weight:300;
      font-size:clamp(1rem, 2.8vw, 1.55rem);
      color:rgba(255,235,245,0.78);
      letter-spacing:0.25em;
      white-space:nowrap;
      text-shadow:
        0 0 25px rgba(255,140,180,0.65),
        0 0 55px rgba(255,80,130,0.22);
    }

    #cur {
      display:inline-block;
      width:1.5px; height:1em;
      background:rgba(255,215,235,0.8);
      margin-left:2px;
      vertical-align:middle;
      animation:blink 0.85s steps(1) infinite;
    }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="vig"></div>
<div id="tw"><div id="tm"><span id="typed"></span><span id="cur"></span></div></div>

<script>
// ═══════════════════════════════════════════════
//  CORE SETUP
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const tw     = document.getElementById('tw');
const typed  = document.getElementById('typed');

const MSG    = "I will always choose you.";
const N      = 1400; // particle count — smooth on mobile

let W, H, CX, CY, SC;

function resize() {
  W  = canvas.width  = window.innerWidth;
  H  = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2 + H * 0.025;
  SC = Math.min(W, H) * 0.011;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

// ═══════════════════════════════════════════════
//  HEART EQUATION
// ═══════════════════════════════════════════════
const hx = t => 16 * Math.sin(t) ** 3;
const hy = t => -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
let P = [];

function init() {
  P = Array.from({length: N}, (_, i) => {
    const t  = (i / N) * Math.PI * 2;
    const tx = CX + hx(t) * SC + (Math.random()-.5) * 9;
    const ty = CY + hy(t) * SC + (Math.random()-.5) * 9;
    const depth = Math.random();
    const ox = CX + (Math.random()-.5) * 6;
    const oy = CY + (Math.random()-.5) * 6;
    return {
      x:ox, y:oy,           // current pos
      ox, oy,               // cluster origin
      tx, ty,               // heart target
      px:ox, py:oy,         // prev pos (for trails)
      size:  depth*1.5+0.4,
      alpha: depth*0.38+0.48,
      depth,
      tw:    Math.random()*Math.PI*2,
      tws:   Math.random()*0.065+0.018,
      sa:    Math.random()*Math.PI*2,  // swirl angle
      sr:    Math.random()*85+28,      // swirl radius
      delay: Math.random()*0.42,
    };
  });
}
init();

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
const lerp  = (a,b,t) => a+(b-a)*t;
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const eio   = t => t<.5 ? 2*t*t : 1-(-2*t+2)**2/2;
const eout  = t => 1-(1-t)**3;
const ein   = t => t*t*t;

// ═══════════════════════════════════════════════
//  STATE MACHINE
// ═══════════════════════════════════════════════
// Phase durations (seconds)
// 0: opening black silence
// 1: single dot heartbeat pulse + shockwave
// 2: particle explosion → heart forms (wave)
// 3: heart holds + double heartbeat + color breathe
// 4: text types out, heart lives
// 5: heart dissolves (edges peel inward)
// 6: closing black silence → loop
const DUR = [1.1, 1.6, 3.8, 3.2, 4.5, 3.4, 1.0];

let phase  = 0;
let phaseT = 0;
let last   = null;

// heartbeat
let hbT = 0, hbS = 1;

// color breath
let brT = 0;

// typewriter
let tyI = 0, tyTmr = 0;
const TY_SPD = 0.068;

// shockwave rings
let shockwaves = [];

function startPhase(p) {
  if (p === 2) {
    // shockwave burst
    shockwaves = [{r:0, alpha:0.7}];
  }
  if (p === 4) {
    tyI = 0; tyTmr = 0;
    typed.textContent = '';
    tw.classList.add('show');
  }
  if (p === 5) {
    tw.classList.remove('show');
  }
  hbT = 0;
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function draw(ts) {
  requestAnimationFrame(draw);

  if (!last) last = ts;
  const dt = Math.min((ts-last)/1000, 0.05);
  last = ts;

  // advance phase
  phaseT += dt / DUR[phase];
  if (phaseT >= 1) {
    phaseT = 0;
    phase  = (phase+1) % DUR.length;
    startPhase(phase);
  }

  ctx.clearRect(0, 0, W, H);

  // ambient background glow
  if (phase >= 2 && phase <= 5) {
    const iA = phase===3||phase===4 ? 0.07
             : phase===2 ? phaseT*0.07
             : (1-phaseT)*0.07;
    const bg = ctx.createRadialGradient(CX,CY,0,CX,CY,Math.min(W,H)*0.52);
    bg.addColorStop(0, `rgba(200,40,90,${iA})`);
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);
  }

  // ─ PHASE 0 & 6: pure black ─
  if (phase === 0 || phase === 6) {
    return;
  }

  // ─ PHASE 1: pulsing dot + shockwave ─
  if (phase === 1) {
    const pulse = Math.sin(phaseT * Math.PI);
    const r     = pulse * 22;

    // glow
    const g = ctx.createRadialGradient(CX,CY,0,CX,CY,r*5);
    g.addColorStop(0, `rgba(255,210,230,${0.95*pulse})`);
    g.addColorStop(0.25, `rgba(255,110,155,${0.45*pulse})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX,CY,r*5,0,Math.PI*2);
    ctx.fill();

    // core dot
    ctx.fillStyle = `rgba(255,255,255,${pulse})`;
    ctx.beginPath();
    ctx.arc(CX,CY,Math.max(0.1,r*0.3),0,Math.PI*2);
    ctx.fill();

    // expanding shockwave ring
    if (phaseT > 0.55) {
      const sw = (phaseT-0.55)/0.45;
      const sr = sw * Math.min(W,H) * 0.38;
      ctx.strokeStyle = `rgba(255,175,210,${(1-sw)*0.55})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(CX,CY,sr,0,Math.PI*2);
      ctx.stroke();
      // second ring slightly smaller
      ctx.strokeStyle = `rgba(255,175,210,${(1-sw)*0.25})`;
      ctx.beginPath();
      ctx.arc(CX,CY,sr*0.65,0,Math.PI*2);
      ctx.stroke();
    }

    // idle cluster
    drawCluster(0.22);
    return;
  }

  // ─ HEARTBEAT (phases 3 & 4) ─
  if (phase===3 || phase===4) {
    hbT += dt * 1.08;
    // lub-DUB rhythm
    const b1 = Math.max(0, Math.sin(hbT * Math.PI * 2)) * 0.55;
    const b2 = Math.max(0, Math.sin((hbT-0.15)*Math.PI*2.8)) * 0.9;
    const bv  = Math.max(b1, b2);
    hbS = 1 + bv * 0.046;

    if (bv > 0.08) {
      const pg = ctx.createRadialGradient(CX,CY,0,CX,CY,Math.min(W,H)*0.42);
      pg.addColorStop(0, `rgba(255,60,110,${bv*0.09})`);
      pg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(0,0,W,H);
    }
  } else {
    hbS = 1;
  }

  // ─ COLOR BREATH ─
  brT += dt * 0.16;
  const brC = (Math.sin(brT)+1)/2; // 0..1

  // ─ TYPEWRITER (phase 4) ─
  if (phase===4) {
    tyTmr += dt;
    const ni = Math.floor(tyTmr/TY_SPD);
    if (ni !== tyI) {
      tyI = Math.min(ni, MSG.length);
      typed.textContent = MSG.slice(0, tyI);
    }
  }

  // ─ DRAW PARTICLES ─
  ctx.save();
  if (hbS !== 1) {
    ctx.translate(CX,CY);
    ctx.scale(hbS,hbS);
    ctx.translate(-CX,-CY);
  }

  P.forEach(p => {
    p.tw += p.tws;
    const twk = 0.5 + 0.5*Math.sin(p.tw);

    let px, py, al;

    if (phase===2) {
      // ── wave-formation: particles launch in a rolling wave ──
      const wv = p.delay * 0.55;
      const rw = clamp((phaseT-wv)/(1-wv*0.6), 0, 1);
      const ep = eio(rw);

      const mx = lerp(p.ox,p.tx,0.5) + Math.cos(p.sa)*p.sr*(1-ep);
      const my = lerp(p.oy,p.ty,0.5) + Math.sin(p.sa)*p.sr*(1-ep);
      px = lerp(lerp(p.ox,mx,ep), lerp(mx,p.tx,ep), ep);
      py = lerp(lerp(p.oy,my,ep), lerp(my,p.ty,ep), ep);
      al = lerp(0.18, p.alpha, ep);

      // motion trail
      if (rw > 0.03 && rw < 0.93) {
        const tr = (1 - Math.abs(rw-0.5)*2) * 0.22;
        ctx.strokeStyle = `rgba(255,220,238,${tr})`;
        ctx.lineWidth   = p.size*0.55;
        ctx.beginPath();
        ctx.moveTo(p.px,p.py);
        ctx.lineTo(px,py);
        ctx.stroke();
      }

    } else if (phase===3 || phase===4) {
      // ── living heart — shimmer + gentle drift ──
      px = p.tx + Math.sin(p.tw*0.55)*2.0;
      py = p.ty + Math.cos(p.tw*0.38)*2.0;
      al = p.alpha;

    } else if (phase===5) {
      // ── dissolve: outer edges peel first ──
      const dist  = Math.hypot(p.tx-CX, p.ty-CY);
      const dNorm = clamp(dist/(SC*20), 0, 1);
      const dly   = (1-dNorm)*0.38; // outer=earlier
      const rw    = clamp((phaseT-dly)/(1-dly*0.7), 0, 1);
      const ep    = eio(rw);

      const mx = lerp(p.tx,p.ox,0.5) + Math.cos(p.sa+Math.PI)*p.sr*0.55*(1-ep);
      const my = lerp(p.ty,p.oy,0.5) + Math.sin(p.sa+Math.PI)*p.sr*0.55*(1-ep);
      px = lerp(lerp(p.tx,mx,ep), lerp(mx,p.ox,ep), ep);
      py = lerp(lerp(p.ty,my,ep), lerp(my,p.oy,ep), ep);
      al = lerp(p.alpha, 0.1, ein(rw));

      // dissolve trail
      if (rw > 0.04 && rw < 0.88) {
        const tr = (1-rw)*0.18;
        ctx.strokeStyle = `rgba(255,200,225,${tr})`;
        ctx.lineWidth   = p.size*0.4;
        ctx.beginPath();
        ctx.moveTo(p.px,p.py);
        ctx.lineTo(px,py);
        ctx.stroke();
      }

    } else {
      // idle cluster (phases between)
      px = p.ox + Math.cos(p.sa+phaseT*1.2)*2.2;
      py = p.oy + Math.sin(p.sa+phaseT*1.2)*2.2;
      al = 0.18;
    }

    p.px = px; p.py = py;

    // color: cold silver ↔ warm rose (only when heart is live)
    const alive = phase===3||phase===4;
    const rC = 248;
    const gC = Math.round(alive ? lerp(245, 158, brC) : 240);
    const bC = Math.round(alive ? lerp(252, 195, brC) : 248);

    const fa = clamp(al*(0.48+0.52*twk), 0, 1);
    const sz = p.size;

    // glow (shadowBlur — fast)
    ctx.shadowColor = `rgba(${rC},${gC},${bC},${fa*0.75})`;
    ctx.shadowBlur  = sz * 9;
    ctx.fillStyle   = `rgba(${rC},${gC},${bC},${fa})`;
    ctx.beginPath();
    ctx.arc(px, py, sz*0.82, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  ctx.restore();
}

function drawCluster(alpha) {
  P.forEach(p => {
    const a  = p.sa + phaseT*1.4;
    const px = p.ox + Math.cos(a)*2.2;
    const py = p.oy + Math.sin(a)*2.2;
    ctx.fillStyle = `rgba(255,240,250,${alpha})`;
    ctx.beginPath();
    ctx.arc(px,py,p.size*0.65,0,Math.PI*2);
    ctx.fill();
  });
}

requestAnimationFrame(draw);
</script>
</body>
</html>
