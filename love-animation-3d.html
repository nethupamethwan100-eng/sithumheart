<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            position: relative;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px; /* Adjust the size as necessary */
            color: red;
            animation: orbit 3s linear infinite;
        }
        @keyframes orbit {
            0% { transform: translate(-50%, -50%) rotate(0deg) translateX(100px) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg) translateX(100px) rotate(-360deg); }
        }
        .text {
            font-size: 24px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">I LOVE YOU</div>
        <div class="heart">❤️</div>
    </div>
</body>
</html>
